spring:
  application:
    name: Nucleus
  jpa:
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        globally_quoted_identifiers: true
        cache:
          use_query_cache: true
          use_second_level_cache: true
          region:
            factory_class: org.redisson.hibernate.RedissonRegionFactory
          redisson:
            fallback: true
            config: redisson.yml
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: NucleusScheduler
            instanceId: AUTO
          jobStore:
            isClustered: true
            clusterCheckinInterval: 20000
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          threadPool:
            threadCount: 5
            threadPriority: 5

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - auditevents
    access:
      default: none
  endpoint:
    health:
      access: read_only
    auditevents:
      access: read_only

logging:
  level:
    ROOT: ERROR
    iterator.nucleus: INFO

nucleus:
  account:
    features:
      interest:
        scheduled-task:
          cron-expression: "59 59 23 * * ?"
          effective-timestamp-hour: 23
          effective-timestamp-minute: 59
          effective-timestamp-second: 59
          increment-duration: P1D
          accrual-increment-duration: PT0.1S
          application-increment-duration: PT2S
        kafka:
          number-of-partitions: 10
          replication-factor: 3
          retry:
            max-attempts: 5
            delay: 1000
            multiplier: 2.0
            max-delay: 30000
  ledger:
    kafka:
      number-of-partitions: 10
      replication-factor: 3
      retry:
        max-attempts: 5
        delay: 1000
        multiplier: 2.0
        max-delay: 30000

---

spring:
  config:
    activate:
      on-profile: minikube

management:
  endpoints:
    web:
      exposure:
        include: "*"
    access:
      default: unrestricted

---

spring:
  config:
    activate:
      on-profile: local

management:
  endpoints:
    web:
      exposure:
        include: "*"
    access:
      default: unrestricted

---

spring:
  config:
    activate:
      on-profile: api-test
  jpa:
    show-sql: true
  main:
    allow-bean-definition-overriding: true

nucleus:
  account:
    features:
      interest:
        scheduled-task:
          cron-expression: "0 0 0 1 1 ? 2099"
        kafka:
          number-of-partitions: 1
          replication-factor: 1
          retry:
            max-attempts: 3
            delay: 10
            multiplier: 1.0
            max-delay: 10
  ledger:
    kafka:
      number-of-partitions: 1
      replication-factor: 1
      retry:
        max-attempts: 3
        delay: 10
        multiplier: 1.0
        max-delay: 10
