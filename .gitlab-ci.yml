stages:
- test

sast:
  stage: test

include:
- template: Security/SAST.gitlab-ci.yml

test:
  stage: test
  image: gradle:8.14-jdk21-alpine
  variables:
    DOCKER_HOST: "tcp:docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  services:
    - name: docker:dind
      command: [ "--tls=false" ]
  script:
    - ./gradlew build
    - ./print-coverage
  coverage: '/([]0-9{1,3}.[0-9]*).%.covered/'
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/**/TEST-*.xml
    paths:
      - build/libs/nucleus.jar
  rules:
    - if: $CI_COMMIT_TAG == null
